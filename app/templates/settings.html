<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - CrewWealth</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --color-primary: #208089;
            --color-primary-hover: #1a6670;
            --color-background: #fcfcf9;
            --color-surface: #ffffff;
            --color-text: #134252;
            --color-text-secondary: #626c71;
            --color-border: #e8e8e0;
            --color-success: #22c55e;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --radius-lg: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
            padding: var(--spacing-lg);
            min-height: 100vh;
        }

        .container { max-width: 800px; margin: 0 auto; }

        .nav-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: var(--spacing-lg);
            transition: all 0.2s;
        }

        .nav-back:hover {
            gap: 12px;
        }

        h1 { 
            font-size: 28px; 
            font-weight: 700; 
            margin-bottom: var(--spacing-lg); 
        }

        .settings-section {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            margin-bottom: var(--spacing-lg);
        }

        .settings-section h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: var(--spacing-lg);
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: var(--spacing-md);
            color: var(--color-text);
        }

        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            font-size: 15px;
            background: white;
            color: var(--color-text);
            cursor: pointer;
            transition: all 0.2s;
        }

        .form-group select:hover {
            border-color: var(--color-primary);
        }

        .form-group select:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(32, 128, 137, 0.1);
        }

        .btn-primary {
            background: var(--color-primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: var(--color-primary-hover);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .success-message {
            background: #ecfdf5;
            border: 1px solid var(--color-success);
            color: #047857;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: var(--spacing-md);
            display: none;
        }

        .currency-info {
            background: #eff6ff;
            border: 1px solid #3b82f6;
            color: #1e40af;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: var(--spacing-md);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="nav-back">← Back to Dashboard</a>
        <h1>⚙️ Settings</h1>
        
        <div class="settings-section">
            <h2>💱 Currency Settings</h2>
            <div class="form-group">
                <label for="currencySelect">Default Currency</label>
                <select id="currencySelect">
                    <option value="EUR">🇪🇺 EUR (€) - Euro</option>
                    <option value="USD">🇺🇸 USD ($) - US Dollar</option>
                    <option value="GBP">🇬🇧 GBP (£) - British Pound</option>
                    <option value="PHP">🇵🇭 PHP (₱) - Philippine Peso</option>
                    <option value="IDR">🇮🇩 IDR (Rp) - Indonesian Rupiah</option>
                </select>
                <div class="currency-info">
                    💡 Select your primary working currency. All amounts will be displayed in this currency.
                </div>
            </div>
            <button onclick="saveCurrency()" class="btn-primary">Save Currency</button>
            <div id="successMessage" class="success-message">
                ✅ Currency settings saved successfully!
            </div>
        </div>
    </div>

    <!-- Shared currency constants/helpers (SUPPORTED_CURRENCIES, isValidCurrency, formatMoney) -->
    <script src="/static/js/currency.js"></script>

    <!-- Firebase SDKs loaded as compat globals; script must NOT use type="module"
         so that firebase.initializeApp() and firebase.auth() globals are accessible. -->
    <script>
        // ============================================
        // FIREBASE CONFIGURATION
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyBccv9C4CpjZFeE2HGBKKfUiV9jUw8CZLo",
            authDomain: "crewwealth-cbe02.firebaseapp.com",
            projectId: "crewwealth-cbe02",
            storageBucket: "crewwealth-cbe02.firebasestorage.app",
            messagingSenderId: "852834158589",
            appId: "1:852834158589:web:8201ed1d9327841773bb94"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;

        // ============================================
        // AUTH STATE OBSERVER
        // ============================================
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                await loadUserSettings();
            } else {
                window.location.href = '/login?next=/settings';
            }
        });

        // ============================================
        // LOAD USER SETTINGS
        // ============================================
        async function loadUserSettings() {
            if (!currentUser) return;

            try {
                const doc = await db.collection('users').doc(currentUser.uid).get();
                if (doc.exists) {
                    const userData = doc.data();
                    // baseCurrency takes precedence over legacy settings.currency
                    const currency = userData.baseCurrency || userData.settings?.currency || DEFAULT_CURRENCY;
                    // Only set if it is a supported code; otherwise leave the default selected
                    if (isValidCurrency(currency)) {
                        document.getElementById('currencySelect').value = currency.toUpperCase();
                    }
                }
            } catch (error) {
                console.error('Error loading user settings:', error.code, error.message);
            }
        }

        // ============================================
        // SAVE CURRENCY SETTING
        // ============================================
        window.saveCurrency = async function() {
            if (!currentUser) {
                alert('Please log in to save settings');
                return;
            }

            const currency = document.getElementById('currencySelect').value;

            // Validate against the canonical list before touching Firestore
            if (!isValidCurrency(currency)) {
                console.warn('saveCurrency: unsupported currency selected:', currency);
                alert('Unsupported currency. Please select one of: ' + SUPPORTED_CURRENCIES.join(', '));
                return;
            }

            try {
                // Use set() with mergeFields so the write succeeds even when the
                // user document does not yet exist (update() throws NOT_FOUND in
                // that case).  mergeFields limits the operation to only the three
                // listed paths, preserving all other fields (e.g. settings.language,
                // settings.theme) exactly as they were.
                await db.collection('users').doc(currentUser.uid).set({
                    baseCurrency: currency,
                    settings: { currency: currency },
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { mergeFields: ['baseCurrency', 'settings.currency', 'updatedAt'] });

                console.log('Currency saved successfully:', currency);

                // Show success message
                const successMsg = document.getElementById('successMessage');
                successMsg.style.display = 'block';

                // Hide after 3 seconds
                setTimeout(() => {
                    successMsg.style.display = 'none';
                }, 3000);

            } catch (error) {
                // Surface the actual Firestore error code to aid debugging
                console.error('Error saving currency:', error.code, error.message, error);
                const errorDetail = error.code ? ` [${error.code}]` : '';
                alert('Failed to save currency settings. Please try again.' + errorDetail);
            }
        };
    </script>
</body>
</html>
