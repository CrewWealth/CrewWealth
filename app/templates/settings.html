<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - CrewWealth</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap">
    <style>
        :root {
            --color-primary: #208089;
            --color-primary-hover: #1a6670;
            --color-accent: #32b8c6;
            --color-background: #fcfcf9;
            --color-surface: #ffffff;
            --color-text: #134252;
            --color-text-secondary: #626c71;
            --color-border: #e8e8e0;
            --color-success: #22c55e;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --spacing-2xl: 48px;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #134252 0%, #208089 100%);
            padding: var(--spacing-xl) var(--spacing-lg);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            margin-bottom: var(--spacing-xl);
        }

        .sidebar-title {
            font-size: 20px;
            font-weight: 700;
            color: white;
        }

        .sidebar-subtitle {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
            flex: 1;
        }

        .menu a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--radius-sm);
            font-size: 14px;
            transition: all 0.2s;
        }

        .menu a:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .menu a.active {
            background: rgba(255,255,255,0.15);
            color: var(--color-accent);
        }

        .logout-btn {
            margin-top: auto;
            padding: var(--spacing-md);
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: var(--radius-sm);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Main Content */
        .main {
            flex: 1;
            padding: var(--spacing-2xl);
            overflow-y: auto;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: var(--spacing-lg);
        }

        .settings-section {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            margin-bottom: var(--spacing-lg);
            max-width: 600px;
        }

        .settings-section h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: var(--spacing-lg);
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
            color: var(--color-text);
        }

        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            font-size: 15px;
            background: white;
            color: var(--color-text);
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .form-group select:hover {
            border-color: var(--color-primary);
        }

        .form-group select:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(32, 128, 137, 0.1);
        }

        .btn-primary {
            background: var(--color-primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary:hover {
            background: var(--color-primary-hover);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .success-message {
            background: #ecfdf5;
            border: 1px solid var(--color-success);
            color: #047857;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            margin-top: var(--spacing-md);
            display: none;
        }

        .currency-info {
            background: #eff6ff;
            border: 1px solid #3b82f6;
            color: #1e40af;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            margin-top: var(--spacing-sm);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">💰 CrewWealth</div>
                <div class="sidebar-subtitle">Financial Management</div>
            </div>

            <nav class="menu">
                <a href="/">🏠 Dashboard</a>
                <a href="/budget">💳 Budget &amp; Accounts</a>
                <a href="/goals">🎯 Goals</a>
                <a href="/reports">📊 Reports</a>
                <a href="/settings" class="active">⚙️ Settings</a>
            </nav>

            <button class="logout-btn" id="logoutBtn">
                🚪 Logout
            </button>
        </aside>

        <!-- Main Content -->
        <main class="main">
            <h1>⚙️ Settings</h1>

            <div class="settings-section">
                <h2>💱 Currency Settings</h2>
                <div class="form-group">
                    <label for="currencySelect">Base Currency</label>
                    <select id="currencySelect">
                        <option value="EUR">🇪🇺 EUR (€) - Euro</option>
                        <option value="USD">🇺🇸 USD ($) - US Dollar</option>
                        <option value="GBP">🇬🇧 GBP (£) - British Pound</option>
                        <option value="PHP">🇵🇭 PHP (₱) - Philippine Peso</option>
                        <option value="IDR">🇮🇩 IDR (Rp) - Indonesian Rupiah</option>
                    </select>
                    <div class="currency-info">
                        💡 Select your base currency. Dashboard totals and projections will be displayed in this currency.
                    </div>
                </div>
                <button onclick="saveCurrency()" class="btn-primary">Save Currency</button>
                <div id="successMessage" class="success-message">
                    ✅ Currency settings saved successfully!
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // ============================================
        // FIREBASE CONFIGURATION
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyBccv9C4CpjZFeE2HGBKKfUiV9jUw8CZLo",
            authDomain: "crewwealth-cbe02.firebaseapp.com",
            projectId: "crewwealth-cbe02",
            storageBucket: "crewwealth-cbe02.firebasestorage.app",
            messagingSenderId: "852834158589",
            appId: "1:852834158589:web:8201ed1d9327841773bb94"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;

        // ============================================
        // AUTH STATE OBSERVER
        // ============================================
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                console.log('✅ User authenticated:', user.email);
                await loadUserSettings();
            } else {
                console.log('❌ Not authenticated, redirecting to login...');
                window.location.href = '/login';
            }
        });

        // ============================================
        // LOAD USER SETTINGS
        // ============================================
        async function loadUserSettings() {
            if (!currentUser) return;

            try {
                const doc = await db.collection('users').doc(currentUser.uid).get();
                if (doc.exists) {
                    const userData = doc.data();
                    // baseCurrency takes precedence over legacy settings.currency
                    const currency = userData.baseCurrency || userData.settings?.currency || 'EUR';
                    document.getElementById('currencySelect').value = currency;
                }
            } catch (error) {
                console.error('Error loading user settings:', error);
            }
        }

        // ============================================
        // SAVE CURRENCY SETTING
        // ============================================
        window.saveCurrency = async function() {
            if (!currentUser) {
                alert('Please log in to save settings');
                return;
            }

            const currency = document.getElementById('currencySelect').value;

            try {
                await db.collection('users').doc(currentUser.uid).update({
                    baseCurrency: currency,
                    'settings.currency': currency,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                console.log('✅ Currency saved:', currency);

                // Show success message
                const successMsg = document.getElementById('successMessage');
                successMsg.style.display = 'block';

                // Hide after 3 seconds
                setTimeout(() => {
                    successMsg.style.display = 'none';
                }, 3000);

            } catch (error) {
                console.error('Error saving currency:', error);
                alert('Failed to save currency settings. Please try again.');
            }
        };

        // ============================================
        // LOGOUT
        // ============================================
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try {
                await auth.signOut();
                console.log('✅ Logged out successfully');
                window.location.href = '/login';
            } catch (error) {
                console.error('❌ Logout error:', error);
                alert('Failed to logout. Please try again.');
            }
        });
    </script>
</body>
</html>
