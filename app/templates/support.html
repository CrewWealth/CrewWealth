<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">
    <title>Support & Legal - CrewWealth</title>
    <style>
        :root {
            --color-primary: #208089;
            --color-background: #fcfcf9;
            --color-surface: #ffffff;
            --color-text: #134252;
            --color-text-secondary: #626c71;
            --color-border: #e8e8e0;
            --radius-lg: 12px;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
        }
        body { font-family: 'Poppins', Arial, sans-serif; background: var(--color-background); color: var(--color-text); margin: 0; padding: 24px; }
        .wrap { max-width: 760px; margin: 0 auto; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-sm); }
        h1 { margin-top: 0; margin-bottom: 12px; }
        p { color: var(--color-text-secondary); }
        .links { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
        a { color: var(--color-primary); text-decoration: none; font-weight: 600; }
        .back { display: inline-block; margin-bottom: 16px; padding: 8px 12px; border: 1px solid var(--color-border); border-radius: 8px; background: #fff; }
    </style>
</head>
<body>
    <div class="wrap">
        <a class="back" href="/">← Back to Dashboard</a>
        <h1>Support & Contact</h1>
        <p>Need help with CrewWealth? Contact us via <a href="mailto:support@crewwealth.app">support@crewwealth.app</a>.</p>
        <p>For account, data, or legal questions, use the policies below:</p>
        <div class="links">
            <a href="/privacy">Privacy Statement</a>
            <a href="/terms">Terms of Use</a>
        </div>
    </div>
</body>
</html>
